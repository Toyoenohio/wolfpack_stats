<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat n8n Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .message {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .typing-indicator::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
    </style>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-lg bg-gray-800 rounded-2xl shadow-2xl overflow-hidden">
        <!-- Header -->
        <div class="bg-blue-600 p-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-white font-bold text-lg">Chat n8n</h1>
                    <p class="text-blue-200 text-xs">Probando automatización</p>
                </div>
            </div>
            <div id="status-indicator" class="w-3 h-3 bg-green-400 rounded-full animate-pulse" title="Conectado"></div>
        </div>

        <!-- Chat Messages -->
        <div id="chat-container" class="h-96 overflow-y-auto p-4 space-y-4 bg-gray-800">
            <!-- Welcome Message -->
            <div class="message flex gap-3">
                <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <div class="bg-gray-700 rounded-2xl rounded-tl-none px-4 py-2 max-w-[80%]">
                    <p class="text-white text-sm">¡Hola! Soy un bot conectado a n8n. Escribe un mensaje para probar la automatización.</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-gray-900 border-t border-gray-700">
            <form id="chat-form" class="flex gap-2">
                <input 
                    type="text" 
                    id="message-input" 
                    placeholder="Escribe tu mensaje..." 
                    class="flex-1 bg-gray-800 text-white px-4 py-3 rounded-xl border border-gray-700 focus:border-blue-500 focus:outline-none"
                    autocomplete="off"
                >
                <button 
                    type="submit" 
                    id="send-btn"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-3 rounded-xl transition flex items-center justify-center"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        // Configuración del webhook
        const WEBHOOK_URL = 'https://n8nciwok-n8n.wz1vdn.easypanel.host/webhook/40b29007-2ca1-4dcf-a0d5-5b1addc4400b/chat';
        
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const statusIndicator = document.getElementById('status-indicator');

        // Auto-scroll al final
        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Agregar mensaje al chat
        function addMessage(text, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message flex gap-3 ' + (isUser ? 'flex-row-reverse' : '');
            
            const iconBg = isUser ? 'bg-green-500' : 'bg-blue-500';
            const icon = isUser 
                ? '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>'
                : '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>';
            
            const bubbleClass = isUser 
                ? 'bg-green-600 rounded-2xl rounded-tr-none' 
                : 'bg-gray-700 rounded-2xl rounded-tl-none';
            
            messageDiv.innerHTML = `
                <div class="w-8 h-8 ${iconBg} rounded-full flex items-center justify-center flex-shrink-0">
                    ${icon}
                </div>
                <div class="${bubbleClass} px-4 py-2 max-w-[80%]">
                    <p class="text-white text-sm">${escapeHtml(text)}</p>
                </div>
            `;
            
            chatContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        // Mostrar indicador de "escribiendo..."
        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typing-indicator';
            typingDiv.className = 'message flex gap-3';
            typingDiv.innerHTML = `
                <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <div class="bg-gray-700 rounded-2xl rounded-tl-none px-4 py-2">
                    <p class="text-gray-400 text-sm typing-indicator">Escribiendo</p>
                </div>
            `;
            chatContainer.appendChild(typingDiv);
            scrollToBottom();
        }

        // Ocultar indicador de "escribiendo..."
        function hideTypingIndicator() {
            const typingIndicator = document.getElementById('typing-indicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        // Escapar HTML para seguridad
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Enviar mensaje al webhook
        async function sendMessage(message) {
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        timestamp: new Date().toISOString(),
                        sessionId: 'test-session-' + Date.now()
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Error:', error);
                return { 
                    response: 'Error al conectar con n8n. Verifica que el webhook esté activo.',
                    error: error.message 
                };
            }
        }

        // Manejar envío del formulario
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const message = messageInput.value.trim();
            if (!message) return;

            // Mostrar mensaje del usuario
            addMessage(message, true);
            messageInput.value = '';
            
            // Deshabilitar input mientras se envía
            messageInput.disabled = true;
            sendBtn.disabled = true;
            sendBtn.classList.add('opacity-50');

            // Mostrar indicador de escritura
            showTypingIndicator();

            // Enviar al webhook y esperar respuesta
            const response = await sendMessage(message);

            // Ocultar indicador y mostrar respuesta
            hideTypingIndicator();
            
            // La respuesta puede venir en diferentes formatos según n8n
            const replyText = response.response || response.message || response.output || JSON.stringify(response);
            addMessage(replyText);

            // Rehabilitar input
            messageInput.disabled = false;
            sendBtn.disabled = false;
            sendBtn.classList.remove('opacity-50');
            messageInput.focus();
        });

        // Verificar conexión al cargar
        window.addEventListener('load', async () => {
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'HEAD'
                });
                if (response.ok || response.status === 405) { // 405 es normal para HEAD en algunos webhooks
                    statusIndicator.classList.remove('bg-red-500');
                    statusIndicator.classList.add('bg-green-400');
                    statusIndicator.title = 'Webhook activo';
                }
            } catch (error) {
                statusIndicator.classList.remove('bg-green-400');
                statusIndicator.classList.add('bg-red-500');
                statusIndicator.title = 'Webhook no responde';
                console.log('Webhook no disponible:', error);
            }
        });

        // Permitir enviar con Enter
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
